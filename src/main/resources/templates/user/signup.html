<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSS読込 -->
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/signup.css}">
  <!-- JS読込 -->
  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
  <title th:text="#{user.signup.title}"></title>
</head>
<body class="bg-light">
  <form id="signup-form" method="post" action="/user/signup" class="form-signup mt-5" th:object="${signupForm}">
    <h2 class="text-center" th:text="#{user.signup.title}"></h2>
    <!-- ユーザーID -->
    <div class="form-group">
      <label for="userId" th:text="#{userId}"></label>
      <input type="text" id="userId" class="form-control" th:field="*{userId}" th:errorclass="is-invalid">
      <div class="invalid-feedback" th:errors="*{userId}"></div>
    </div>
    <!-- パスワード -->
    <div class="form-group">
      <label for="password" th:text="#{password}"></label>
      <input type="text" id="password" class="form-control" th:field="*{password}" th:errorclass="is-invalid">
      <div class="invalid-feedback" th:errors="*{password}"></div>
    </div>
    <!-- ユーザー名 -->
    <div class="form-group">
      <label for="userName" th:text="#{userName}"></label>
      <input type="text" id="userName" class="form-control" th:field="*{userName}" th:errorclass="is-invalid">
      <div class="invalid-feedback" th:errors="*{userName}"></div>
    </div>
    <!-- 誕生日 -->
    <div class="form-group">
      <label for="birthday" th:text="#{birthday}"></label>
      <input type="text" id="birthday" class="form-control" placeholder="YYYY/MM/DD" th:field="*{birthday}" th:errorclass="is-invalid">
      <div class="invalid-feedback" th:errors="*{birthday}"></div>
    </div>
    <!-- 年齢 -->
    <div class="form-group">
      <label for="age" th:text="#{age}"></label>
      <input type="text" id="age" class="form-control" th:field="*{age}" th:errorclass="is-invalid">
      <div class="invalid-feedback" th:errors="*{age}"></div>
    </div>
    <!-- 性別 -->
    <div class="form-group mt-2">
      <label class="me-3" th:text="#{gender}"></label>
      <div th:each="item : ${genderMap}" class="form-check-inline">
        <input type="radio" class="form-check-input" th:value="${item.value}" th:field="*{gender}"th:errorclass="is-invalid">
        <label class="form-check-label" th:text="${item.key}"></label>
      </div>
      <div class="text-danger" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
    </div>
    <!-- エラーメッセージ -->
    <p th:if="${errorMessage != null}" class="text-danger mt-3" th:text="${errorMessage}"></p>
    <!-- 登録ボタン -->
    <input type="submit" th:value="#{user.signup.btn}" class="btn btn-primary w-100 mt-4">
    <div class="text-center mt-2">
      <a th:href="@{/login}" th:text="#{link.login}"></a>
    </div>
  </form>
  </body>
</html>
